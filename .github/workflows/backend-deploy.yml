name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
      - 'deploy/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x Backend/gradlew

      - name: Build JAR
        working-directory: Backend
        run: ./gradlew bootJar -x test --no-daemon

      - name: Rename JAR to app.jar
        run: mv Backend/build/libs/*[^plain].jar Backend/build/libs/app.jar

      # app.jar 업로드
      - name: Upload app.jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "Backend/build/libs/app.jar"
          target: "/home/ubuntu/resumade/"
          strip_components: 3

      # deploy/ 설정 파일 + tessdata 업로드 (docker-compose, Dockerfile, nginx, tessdata)
      - name: Upload deploy configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.yml,deploy/Dockerfile,deploy/nginx,Backend/tessdata"
          target: "/home/ubuntu/resumade/"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/resumade
            docker compose pull resumade-mysql resumade-redis resumade-es nginx 2>/dev/null || true
            docker compose up -d --build app
            docker compose up -d nginx
            echo "=== 실행 중인 컨테이너 ==="
            docker compose ps
