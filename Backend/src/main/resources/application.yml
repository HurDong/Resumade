spring:
  application:
    name: resumade-api

  datasource:
    url: jdbc:mysql://localhost:3307/resumade?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: resumade_user
    password: resumade_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6380

  elasticsearch:
    uris: http://localhost:9200
  
server:
  port: 8080
