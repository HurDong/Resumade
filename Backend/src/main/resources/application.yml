spring:
  application:
    name: resumade-api

  config:
    import: optional:file:../.env[.properties]

  mvc:
    async:
      request-timeout: 10m

  datasource:
    url: jdbc:mysql://localhost:3307/resumade?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: resumade_user
    password: resumade_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6380

  elasticsearch:
    uris: http://localhost:9200

openai:
  api:
    key: ${OPENAI_API_KEY:demo}
    timeout: ${OPENAI_API_TIMEOUT:PT5M}
  models:
    experience: ${OPENAI_EXPERIENCE_MODEL:gpt-5-mini}
    workspace-draft: ${OPENAI_WORKSPACE_DRAFT_MODEL:gpt-5-mini}
    workspace-patch: ${OPENAI_WORKSPACE_PATCH_MODEL:gpt-5-mini}
    jd-text: ${OPENAI_JD_TEXT_MODEL:gpt-5-mini}
    jd-vision: ${OPENAI_JD_VISION_MODEL:gpt-4o}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
  models:
    company-research: ${GEMINI_COMPANY_RESEARCH_MODEL:gemini-2.5-flash-lite}

deepl:
  api:
    key: ${DEEPL_API_KEY:demo}

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
