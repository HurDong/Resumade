spring:
  application:
    name: resumade-api

  config:
    import: optional:file:../.env[.properties]

  mvc:
    async:
      request-timeout: 10m

  datasource:
    url: jdbc:mysql://localhost:3307/resumade?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USERNAME:resumade_user}
    password: ${MYSQL_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: localhost
      port: 6380

  elasticsearch:
    uris: http://localhost:9200

openai:
  api:
    key: ${OPENAI_API_KEY:demo}
    timeout: ${OPENAI_API_TIMEOUT:PT5M}
  models:
    experience: ${OPENAI_EXPERIENCE_MODEL:gpt-4o-mini}
    workspace-plan: ${OPENAI_WORKSPACE_PLAN_MODEL:${OPENAI_WORKSPACE_DRAFT_MODEL:gpt-5-mini}}
    workspace-draft: ${OPENAI_WORKSPACE_DRAFT_MODEL:gpt-5-mini}
    workspace-utility: ${OPENAI_WORKSPACE_UTILITY_MODEL:gpt-5-mini}
    workspace-patch: ${OPENAI_WORKSPACE_PATCH_MODEL:gpt-4o-mini}
    jd-text: ${OPENAI_JD_TEXT_MODEL:gpt-4o-mini}
    jd-vision: ${OPENAI_JD_VISION_MODEL:gpt-5.4-mini}
    final-editor: ${OPENAI_FINAL_EDITOR_MODEL:gpt-4o-mini}
    spell-check: ${OPENAI_SPELL_CHECK_MODEL:gpt-5-nano}
    question-analyzer: ${OPENAI_QUESTION_ANALYZER_MODEL:gpt-4o-mini}
    draft-quality-checker: ${OPENAI_DRAFT_QUALITY_CHECKER_MODEL:gpt-4o-mini}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
  models:
    company-research: ${GEMINI_COMPANY_RESEARCH_MODEL:gemini-2.5-flash-lite}
    jd-vision: ${GEMINI_JD_VISION_MODEL:gemini-2.5-flash-lite}

translation:
  provider: ${TRANSLATION_PROVIDER:deepl}
  fallback-provider: ${TRANSLATION_FALLBACK_PROVIDER:}
  google-cloud:
    api-key: ${GOOGLE_CLOUD_TRANSLATE_API_KEY:${GEMINI_API_KEY:}}

deepl:
  api:
    key: ${DEEPL_API_KEY:demo}

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
