plugins {
	id 'java'
	id 'org.springframework.boot' version '3.4.3'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.resumade'
version = '0.0.1-SNAPSHOT'
description = 'Backend for Resumade'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-elasticsearch'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-data-redis'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	
	// LangChain4j for RAG Pipeline
	implementation 'dev.langchain4j:langchain4j:0.31.0'
	implementation 'dev.langchain4j:langchain4j-open-ai:0.31.0'
	implementation 'dev.langchain4j:langchain4j-elasticsearch:0.31.0'
	
	// Tesseract OCR for Image Text Extraction
	implementation 'net.sourceforge.tess4j:tess4j:5.11.0'

	// Apache PDFBox for PDF Text Extraction
	implementation 'org.apache.pdfbox:pdfbox:3.0.3'
	
	// JSON Processing
	implementation 'com.fasterxml.jackson.core:jackson-databind'
	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'com.mysql:mysql-connector-j'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-elasticsearch-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-redis-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-validation-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-web-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
}

bootRun {
	jvmArgs = [
		'-Dfile.encoding=UTF-8',
		'-Dstdout.encoding=UTF-8',
		'-Dstderr.encoding=UTF-8',
		'-XX:TieredStopAtLevel=1',
		'-Xverify:none',
		'-Dspring.profiles.active=local'
	]

	if (file("../.env").exists()) {
		file("../.env").readLines().each { line ->
			if (!line.isEmpty() && !line.startsWith("#")) {
				def parts = line.split("=", 2)
				if (parts.length == 2) {
					def key = parts[0].trim()
					def value = parts[1].trim().replaceAll(/^["']|["']$/, "")
					environment key, value
				}
			}
		}
	}
}
