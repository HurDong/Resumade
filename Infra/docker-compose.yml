services:
  mysql:
    image: mysql:8.0
    container_name: resumade-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: resumade
      MYSQL_USER: resumade_user
      MYSQL_PASSWORD: resumade_password
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - resumade-network

  redis:
    image: redis:alpine
    container_name: resumade-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - resumade-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: resumade-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - resumade-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.1
    container_name: resumade-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - resumade-network

  nginx:
    image: nginx:alpine
    container_name: resumade-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mysql
      - redis
      - elasticsearch
    networks:
      - resumade-network

networks:
  resumade-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  es-data:
